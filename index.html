<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="weather-card">

            <div class="search-box">
                <input  id="city-input" type="text" placeholder="Enter city name">
                <button id="search-button">Search</button>
            </div>

            <div class="weather-info">
                <h2 id="city-name" class="city">Delhi</h2>
                <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="weather icon">
                <h1 id="temp" class="temp">28°C</h1>
                <p id="city-time" class="time">local time</p>
            </div>

        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
